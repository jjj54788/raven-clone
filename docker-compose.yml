services:
  postgres:
    image: postgres:17
    container_name: gewu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: gewu_ai
    ports:
      - '5433:5432'
    volumes:
      - gewu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gewu_pgdata:
